    <meta name="description" property="og:description" content="We’re building a world of health around every individual — shaping a more connected, convenient and compassionate health experience. At CVS Health®, you’ll be surrounded by passionate colleagues who care deeply, innovate with purpose, hold ourselves accountable and prioritize safety and quality in everything we do. Join us and be part of something bigger – helping to simplify health care one person, one family and one community at a time. Role Description: As an Analyst in the Analyst Development Program (ADP), your role will be to provide programmatic support by conducting analyses, owning high visibility reports, and assisting with strategic conversations. As an Analyst, a core skill will also be working cross functionally across teams and communicating with a diverse set of team members and leadership. The ADP is an immersive multi-year development experience that helps build core problem-solving, data analysis, project management, and communication skills. This program will consist of small and large group training, exposure to senior leadership mentorship, opportunity for quick career progression, and collaboration across many business functions. The program is one of the ways Oak Street and CVS Health invest to build high performance leaders on the cutting edge of value based healthcare delivery. All Analysts within the program will be staffed full-time on a team within the Oak Street Corporate Office (e.g., Growth, Patient Engagement, Population Health) with opportunities to partner with other teams. Core Responsibilities: Drive strategic analyses &amp;amp; develop data-driven insights Build and analyze large-scale datasets to identify trends, connect operational action to financial impact, and surface key insights for improving patient outcomes and engagement Communicate analytical insights clearly across various levels of the organization, from regional leadership to C-suite level executives Own reporting to support workstreams Co-produce reporting structures with business owners that display the highest impact metrics that are most actionable and accessible for end users Maintain high-visibility tools and dashboard to enable field and central leaders to better understand programmatic KPI performance Professional growth &amp;amp; development Actively participate in small and large group trainings to develop technical and leadership skills Seek feedback and mentorship from peers and senior colleagues and participate in career development planning. Collaborate with team members across the organization (HQ and field) to gain a deeper understanding of the impact of business decisions on our patients and to strengthen understanding of the Oak Street business model Other duties as assigned Essential Qualifications: Education: Bachelor&#39;s degree preferred Experience: 0-2 years prior relevant experience Interest, experience, and/or passion for healthcare and value based care Experience leveraging data / analytics to solve problems Effective and flexible team player Analytical and strategic thinker who is intellectually curious Strong written and verbal communication skills Interest in actively seeking feedback to empower professional development US work authorization Someone who embodies being “Oaky” What does being Oaky look like? Radiating positive energy Assuming good intentions Creating an unmatched patient experience Driving clinical excellence Taking ownership and delivering results Being relentlessly determined Preferred Qualifications: Proficiency in Excel strongly preferred Experience with other data analytics tools (e.g., Stata, Alteryx), data visualization tools (e.g., Tableau, PowerBI), and/or SQL a plus Why Oak Street Health? Oak Street Health is on a mission to Rebuild healthcare as it should be, providing personalized primary care for older adults on Medicare, with the goal of keeping patients healthy and living life to the fullest. Our innovative care model is centered right in our patient’s communities, and focused on the quality of care over volume of services. We’re an organization on the move! With over 150 locations and an ambitious growth trajectory, Oak Street Health is attracting and cultivating team members who embody “Oaky” values and passion for our mission. Anticipated Weekly Hours 40 Time Type Full time Pay Range The typical pay range for this role is: $21.10 - $44.99 This pay range represents the base hourly rate or base annual full-time salary for all positions in the job grade within which this position falls. The actual base salary offer will depend on a variety of factors including experience, education, geography and other relevant factors. This position is eligible for a CVS Health bonus, commission or short-term incentive program in addition to the base pay range listed above. Our people fuel our future. Our teams reflect the customers, patients, members and communities we serve and we are committed to fostering a workplace where every colleague feels valued and that they belong. Great benefits for great people We take pride in our comprehensive and competitive mix of pay and benefits – investing in the physical, emotional and financial wellness of our colleagues and their families to help them be the healthiest they can be. In addition to our competitive wages, our great benefits include: Affordable medical plan options, a 401(k) plan (including matching company contributions), and an employee stock purchase plan. No-cost programs for all colleagues including wellness screenings, tobacco cessation and weight management programs, confidential counseling and financial coaching. Benefit solutions that address the different needs and preferences of our colleagues including paid time off, flexible work schedules, family leave, dependent care resources, colleague assistance programs, tuition assistance, retiree medical access and many other benefits depending on eligibility. For more information, visit https://jobs.cvshealth.com/us/en/benefits We anticipate the application window for this opening will close on: 03/13/2026 Qualified applicants with arrest or conviction records will be considered for employment in accordance with all federal, state and local laws. Our Work Experience is the combination of everything that&#39;s unique about us: our culture, our core values, our company meetings, our commitment to sustainability, our recognition programs, but most importantly, it&#39;s our people. Our employees are self-disciplined, hard working, curious, trustworthy, humble, and truthful. They make choices according to what is best for the team, they live for opportunities to collaborate and make a difference, and they make us the #1 Top Workplace in the area.">
